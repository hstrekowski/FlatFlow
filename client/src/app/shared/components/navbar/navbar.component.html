<p-toolbar styleClass="navbar">
  <ng-template #start>
    <a routerLink="/flats" class="navbar-logo">Flat Flow</a>
  </ng-template>
  <ng-template #end>
    <div class="navbar-right">
      <a routerLink="/profile" class="navbar-user">
        <i class="pi pi-user"></i>
        {{ firstName }}
      </a>
      <p-button
        label="Logout"
        icon="pi pi-sign-out"
        [text]="true"
        severity="secondary"
        (onClick)="onLogout()"
      />
    </div>
  </ng-template>
</p-toolbar>
