<p-toast />
<div class="settings-page">
  <h2>Settings</h2>

  @if (loading()) {
    <p class="loading-text">Loading...</p>
  }

  @if (!loading()) {
    <form [formGroup]="form" (ngSubmit)="onSave()" class="settings-form">
      <div class="field">
        <label for="name">Name</label>
        <input id="name" type="text" pInputText formControlName="name" class="w-full" />
      </div>

      <div class="field">
        <label for="street">Street</label>
        <input id="street" type="text" pInputText formControlName="street" class="w-full" />
      </div>

      <div class="field">
        <label for="city">City</label>
        <input id="city" type="text" pInputText formControlName="city" class="w-full" />
      </div>

      <div class="field">
        <label for="zipCode">Zip Code</label>
        <input id="zipCode" type="text" pInputText formControlName="zipCode" class="w-full" />
      </div>

      <div class="field">
        <label for="country">Country</label>
        <input id="country" type="text" pInputText formControlName="country" class="w-full" />
      </div>

      <p-button
        type="submit"
        label="Save"
        icon="pi pi-check"
        [loading]="saving()"
        [disabled]="form.invalid"
      />
    </form>

    <div class="section">
      <h3>Access Code</h3>
      <div class="access-code-row">
        <code class="access-code">{{ accessCode() }}</code>
        <p-button
          label="Refresh"
          icon="pi pi-refresh"
          [outlined]="true"
          [loading]="refreshing()"
          (onClick)="onRefreshAccessCode()"
        />
      </div>
    </div>

    <div class="section danger-section">
      <h3>Danger Zone</h3>
      <p class="danger-text">Deleting this flat will remove all data including tenants, chores, payments, and notes.</p>
      <p-button
        label="Delete Flat"
        icon="pi pi-trash"
        severity="danger"
        (onClick)="confirmDelete()"
      />
    </div>
  }

  <p-confirmDialog />
</div>
