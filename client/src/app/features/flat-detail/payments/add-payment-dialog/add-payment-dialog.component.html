<p-dialog
  header="Add Payment"
  [modal]="true"
  [(visible)]="visible"
  [style]="{ width: '450px', overflow: 'visible' }"
  [contentStyle]="{ overflow: 'visible' }"
>
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="dialog-form">
    <div class="field">
      <label for="title">Title</label>
      <input id="title" type="text" pInputText formControlName="title" class="w-full" />
    </div>

    <div class="field">
      <label for="amount">Amount</label>
      <p-inputnumber
        id="amount"
        formControlName="amount"
        mode="currency"
        currency="PLN"
        [minFractionDigits]="2"
        styleClass="w-full"
      />
    </div>

    <div class="field">
      <label for="dueDate">Due Date</label>
      <p-datepicker
        id="dueDate"
        formControlName="dueDate"
        [showIcon]="true"
        dateFormat="yy-mm-dd"
        styleClass="w-full"
      />
    </div>

    @if (errorMessage()) {
      <p-message severity="error" [text]="errorMessage()" class="w-full" />
    }

    <p-button
      type="submit"
      label="Add"
      [loading]="loading()"
      [disabled]="form.invalid"
      styleClass="w-full"
    />
  </form>
</p-dialog>
