<p-dialog
  header="Add Assignment"
  [modal]="true"
  [(visible)]="visible"
  [style]="{ width: '450px', overflow: 'visible' }"
  [contentStyle]="{ overflow: 'visible' }"
>
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="dialog-form">
    <div class="field">
      <label for="tenantId">Tenant</label>
      <p-select
        id="tenantId"
        formControlName="tenantId"
        [options]="tenants()"
        optionLabel="firstName"
        optionValue="id"
        placeholder="Select tenant"
        styleClass="w-full"
      />
    </div>

    <div class="field">
      <label for="dueDate">Due Date</label>
      <p-datepicker
        id="dueDate"
        formControlName="dueDate"
        [showIcon]="true"
        dateFormat="yy-mm-dd"
        styleClass="w-full"
      />
    </div>

    @if (errorMessage()) {
      <p-message severity="error" [text]="errorMessage()" class="w-full" />
    }

    <p-button
      type="submit"
      label="Add"
      [loading]="loading()"
      [disabled]="form.invalid"
      styleClass="w-full"
    />
  </form>
</p-dialog>
